<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🌿 Dindigul Summer Sips</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,600;0,700;0,900;1,400&family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --terra:   #C1440E;
  --terra-lt:#F2886A;
  --sand:    #E8D5B7;
  --sand-dk: #C9B48A;
  --sage:    #5C7A5A;
  --sage-lt: #8DAB8A;
  --sage-bg: #EEF3EC;
  --warm-br: #7C5832;
  --cream:   #FAF6EF;
  --parch:   #F0E8D8;
  --ink:     #2C1A0E;
  --muted:   #8A7560;
  --rule:    #D9CCBA;

  --m-acc:  #D97706; --m-bg: #FEF3C7; --m-txt: #78350F;
  --n-acc:  #0E7490; --n-bg: #E0F2FE; --n-txt: #164E63;
  --e-acc:  #5C7A5A; --e-bg: #EEF3EC; --e-txt: #1A3318;
  --nt-acc: #6B3F1A; --nt-bg:#F5EAD8; --nt-txt:#3B1A06;
}

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}

body {
  font-family: 'Outfit', sans-serif;
  background: var(--cream);
  color: var(--ink);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── DASHBOARD HEADER ──────────────────────────────────────── */
.dash-header {
  background: var(--ink);
  padding: 20px 16px 0;
  position: relative;
  overflow: hidden;
}
.dash-header::before {
  content: '';
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse at 80% 20%, rgba(193,68,14,0.18) 0%, transparent 55%),
    radial-gradient(ellipse at 10% 80%, rgba(92,122,90,0.15) 0%, transparent 50%);
  pointer-events: none;
}
.dash-top-row {
  display: flex; justify-content: space-between; align-items: flex-start;
  position: relative;
}
.dash-brand {
  display: flex; flex-direction: column; gap: 2px;
}
.dash-brand-eyebrow {
  font-family: 'DM Mono', monospace;
  font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
  color: var(--terra-lt); opacity: 0.85;
}
.dash-brand-title {
  font-family: 'Fraunces', serif;
  font-size: clamp(22px, 6vw, 30px);
  font-weight: 900; color: var(--sand);
  line-height: 1.1;
}
.dash-brand-title em { color: var(--terra-lt); font-style: italic; }
.dash-date {
  font-family: 'DM Mono', monospace;
  font-size: 10px; color: var(--muted);
  text-align: right; line-height: 1.6;
}

/* ── KPI ROW ─────────────────────────────────────────────────── */
.kpi-row {
  display: grid; grid-template-columns: repeat(4, 1fr);
  gap: 10px; padding: 16px 0 0;
  position: relative;
}
.kpi-card {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 12px; padding: 10px 8px;
  text-align: center;
}
.kpi-val {
  font-family: 'Fraunces', serif;
  font-size: 20px; font-weight: 700; line-height: 1;
}
.kpi-lbl {
  font-size: 9px; letter-spacing: 0.8px; text-transform: uppercase;
  color: rgba(255,255,255,0.45); margin-top: 3px;
  font-family: 'DM Mono', monospace;
}
.kpi-card.morning .kpi-val { color: #FCD34D; }
.kpi-card.noon    .kpi-val { color: #67E8F9; }
.kpi-card.evening .kpi-val { color: #86EFAC; }
.kpi-card.night   .kpi-val { color: #FCA5A5; }

/* ── MASTER PROGRESS ─────────────────────────────────────────── */
.master-prog {
  padding: 14px 0 18px;
  position: relative;
}
.mprog-label-row {
  display: flex; justify-content: space-between; align-items: baseline;
  margin-bottom: 7px;
}
.mprog-lbl {
  font-family: 'DM Mono', monospace;
  font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase;
  color: rgba(255,255,255,0.4);
}
.mprog-val {
  font-family: 'Fraunces', serif;
  font-size: 24px; font-weight: 700; color: var(--terra-lt);
}
.mprog-track {
  height: 4px; background: rgba(255,255,255,0.1);
  border-radius: 99px; overflow: hidden; margin-bottom: 6px;
}
.mprog-fill {
  height: 100%; border-radius: 99px;
  background: linear-gradient(90deg, var(--terra), var(--terra-lt), #FBBF24);
  transition: width 0.7s cubic-bezier(.4,0,.2,1);
}
.mprog-sub {
  display: flex; justify-content: space-between;
  font-size: 10px; font-family: 'DM Mono', monospace;
}
.mprog-count { color: rgba(255,255,255,0.35); }
.mprog-milestone { color: var(--sage-lt); font-weight: 500; }

/* section mini bars */
.section-bars {
  display: flex; gap: 6px; padding-bottom: 16px;
}
.sbar { flex: 1; }
.sbar-label {
  font-size: 9px; font-family: 'DM Mono', monospace;
  letter-spacing: 0.5px; text-transform: uppercase;
  margin-bottom: 4px;
}
.sbar-track { height: 3px; background: rgba(255,255,255,0.08); border-radius: 99px; overflow:hidden; }
.sbar-fill  { height: 100%; border-radius: 99px; transition: width 0.5s ease; }
.sbar.morning .sbar-label { color:#FCD34D; }
.sbar.morning .sbar-fill  { background:#FCD34D; }
.sbar.noon    .sbar-label { color:#67E8F9; }
.sbar.noon    .sbar-fill  { background:#67E8F9; }
.sbar.evening .sbar-label { color:#86EFAC; }
.sbar.evening .sbar-fill  { background:#86EFAC; }
.sbar.night   .sbar-label { color:#FCA5A5; }
.sbar.night   .sbar-fill  { background:#FCA5A5; }
.sbar-count { font-size:9px; font-family:'DM Mono',monospace; color:rgba(255,255,255,0.3); margin-top:3px; }

/* ── CONTROLS ────────────────────────────────────────────────── */
.controls-bar {
  background: var(--parch);
  border-bottom: 1px solid var(--rule);
  padding: 10px 14px;
  display: flex; flex-direction: column; gap: 8px;
  position: sticky; top: 0; z-index: 50;
}
.search-row {
  display: flex; align-items: center; gap: 8px;
  background: var(--cream); border: 1.5px solid var(--rule);
  border-radius: 10px; padding: 8px 12px;
  transition: border-color 0.2s;
}
.search-row:focus-within { border-color: var(--terra); }
.search-row input {
  flex:1; border:none; background:transparent; outline:none;
  font-family:'Outfit',sans-serif; font-size:13px; color:var(--ink);
}
.search-row input::placeholder { color:var(--muted); }
.search-icon { font-size:15px; }

.filter-chips {
  display:flex; gap:6px; overflow-x:auto; scrollbar-width:none; padding-bottom:1px;
}
.filter-chips::-webkit-scrollbar { display:none; }
.fchip {
  flex-shrink:0; padding:5px 12px; border-radius:6px;
  border:1.5px solid var(--rule); background:transparent;
  font-family:'DM Mono',monospace; font-size:10px;
  letter-spacing:0.5px; text-transform:uppercase;
  cursor:pointer; color:var(--muted);
  transition:all 0.15s; white-space:nowrap;
}
.fchip.on-all     { background:var(--ink);    border-color:var(--ink);    color:#fff; }
.fchip.on-morning { background:var(--m-acc);  border-color:var(--m-acc);  color:#fff; }
.fchip.on-noon    { background:var(--n-acc);  border-color:var(--n-acc);  color:#fff; }
.fchip.on-evening { background:var(--e-acc);  border-color:var(--e-acc);  color:#fff; }
.fchip.on-night   { background:var(--nt-acc); border-color:var(--nt-acc); color:#fff; }
.fchip.on-fav     { background:#C0392B;       border-color:#C0392B;       color:#fff; }
.fchip.on-tried   { background:var(--sage);   border-color:var(--sage);   color:#fff; }
.fchip.on-untried { background:var(--warm-br);border-color:var(--warm-br);color:#fff; }

/* ── SECTION LABEL ───────────────────────────────────────────── */
.sec-hdr {
  display:flex; align-items:center; gap:10px;
  padding:14px 14px 6px;
  position:sticky; top:74px; z-index:40;
  background:var(--cream);
  border-bottom:1px solid var(--rule);
}
.sec-hdr-dot {
  width:10px; height:10px; border-radius:50%; flex-shrink:0;
}
.morning .sec-hdr-dot  { background:var(--m-acc); }
.noon    .sec-hdr-dot  { background:var(--n-acc); }
.evening .sec-hdr-dot  { background:var(--e-acc); }
.night   .sec-hdr-dot  { background:var(--nt-acc); }

.sec-hdr-title {
  font-family:'Fraunces',serif; font-size:16px; font-weight:700;
  color:var(--ink); flex:1;
}
.sec-hdr-meta {
  font-family:'DM Mono',monospace; font-size:10px;
  color:var(--muted); text-align:right; line-height:1.5;
}
.sec-prog-wrap { width:52px; }
.sec-prog-track { height:3px; background:var(--rule); border-radius:99px; overflow:hidden; margin-top:4px; }
.sec-prog-fill  { height:100%; border-radius:99px; transition:width 0.4s; }
.morning .sec-prog-fill  { background:var(--m-acc); }
.noon    .sec-prog-fill  { background:var(--n-acc); }
.evening .sec-prog-fill  { background:var(--e-acc); }
.night   .sec-prog-fill  { background:var(--nt-acc); }

/* ── COMPACT ROW ─────────────────────────────────────────────── */
.drink-rows { padding:0; }

.drow {
  display:flex; align-items:center;
  padding:11px 14px;
  border-bottom:1px solid var(--rule);
  gap:10px;
  transition:background 0.15s;
  position:relative;
  animation:rowslide 0.25s ease both;
}
.drow:active { background:var(--parch); }
@keyframes rowslide { from{opacity:0;transform:translateX(-6px)} to{opacity:1;transform:translateX(0)} }
.drow.tried-row { background:rgba(92,122,90,0.06); }
.drow.fav-row::before {
  content:'';
  position:absolute; left:0; top:0; bottom:0; width:3px;
  background:#C0392B; border-radius:0 3px 3px 0;
}
.drow.hidden { display:none; }

/* left index */
.row-idx {
  font-family:'DM Mono',monospace; font-size:10px;
  color:var(--muted); width:30px; flex-shrink:0; text-align:right;
}

/* time dot */
.row-dot {
  width:8px; height:8px; border-radius:50%; flex-shrink:0;
}
.morning .row-dot  { background:var(--m-acc); }
.noon    .row-dot  { background:var(--n-acc); }
.evening .row-dot  { background:var(--e-acc); }
.night   .row-dot  { background:var(--nt-acc); }

/* main info */
.row-info { flex:1; min-width:0; }
.row-name {
  font-weight:600; font-size:13.5px;
  color:var(--ink); line-height:1.2;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.row-name-custom { font-size:8px; font-weight:700;
  padding:1px 5px; border-radius:3px; vertical-align:middle;
  background:#D1FAE5; color:#065F46; margin-left:5px; letter-spacing:0.3px;
}
.row-sub {
  font-size:11px; color:var(--muted); margin-top:2px;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}

/* tags */
.row-tags { display:flex; gap:4px; align-items:center; }
.time-pill {
  font-family:'DM Mono',monospace; font-size:9px;
  padding:2px 7px; border-radius:4px; flex-shrink:0;
  letter-spacing:0.3px; font-weight:500;
}
.morning .time-pill  { background:var(--m-bg); color:var(--m-txt); }
.noon    .time-pill  { background:var(--n-bg); color:var(--n-txt); }
.evening .time-pill  { background:var(--e-bg); color:var(--e-txt); }
.night   .time-pill  { background:var(--nt-bg);color:var(--nt-txt); }

/* action btns */
.row-actions { display:flex; align-items:center; gap:6px; flex-shrink:0; }
.row-expand-btn {
  width:28px; height:28px; border-radius:7px;
  border:1.5px solid var(--rule); background:var(--parch);
  cursor:pointer; font-size:13px; color:var(--muted);
  display:flex; align-items:center; justify-content:center;
  transition:all 0.15s;
}
.row-expand-btn:active { background:var(--sand); }

.row-fav {
  width:28px; height:28px; border-radius:7px;
  border:none; background:transparent;
  font-size:15px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition:transform 0.2s;
}
.row-fav:active { transform:scale(1.3); }

.row-check {
  width:28px; height:28px; border-radius:7px;
  border:1.5px solid var(--rule); background:transparent;
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  font-size:13px; color:transparent; transition:all 0.18s;
}
.row-check.on { color:#fff; border-color:transparent; }
.morning  .row-check.on { background:var(--m-acc); }
.noon     .row-check.on { background:var(--n-acc); }
.evening  .row-check.on { background:var(--e-acc); }
.night    .row-check.on { background:var(--nt-acc); }

/* ── EXPANDED INLINE PANEL ───────────────────────────────────── */
.row-expand-panel {
  max-height:0; overflow:hidden;
  transition:max-height 0.4s cubic-bezier(.4,0,.2,1);
  background:var(--parch);
  border-bottom:1px solid var(--sand-dk);
}
.row-expand-panel.open { max-height:600px; }
.panel-inner { padding:14px 14px 14px 54px; display:flex; flex-direction:column; gap:12px; }

.panel-section-label {
  font-family:'DM Mono',monospace; font-size:9px;
  letter-spacing:1.5px; text-transform:uppercase; color:var(--muted);
  margin-bottom:5px;
}

.ing-list { display:flex; flex-wrap:wrap; gap:5px; }
.ing-tag {
  font-size:11px; padding:3px 9px; border-radius:5px;
  background:var(--cream); border:1px solid var(--rule);
  color:var(--ink); font-weight:500;
}

.recipe-steps { display:flex; flex-direction:column; gap:8px; }
.rstep { display:flex; gap:10px; align-items:flex-start; }
.rstep-num {
  flex-shrink:0; width:20px; height:20px; border-radius:5px;
  display:flex; align-items:center; justify-content:center;
  font-family:'DM Mono',monospace; font-size:10px; font-weight:500;
  color:#fff;
}
.morning  .rstep-num { background:var(--m-acc); }
.noon     .rstep-num { background:var(--n-acc); }
.evening  .rstep-num { background:var(--e-acc); }
.night    .rstep-num { background:var(--nt-acc); }
.rstep-txt { font-size:12.5px; line-height:1.55; color:var(--ink); padding-top:2px; }

.ben-list { display:flex; flex-wrap:wrap; gap:5px; }
.ben-tag {
  font-size:11px; padding:3px 9px; border-radius:5px; font-weight:600;
}
.morning  .ben-tag { background:var(--m-bg); color:var(--m-txt); }
.noon     .ben-tag { background:var(--n-bg); color:var(--n-txt); }
.evening  .ben-tag { background:var(--e-bg); color:var(--e-txt); }
.night    .ben-tag { background:var(--nt-bg);color:var(--nt-txt); }

.mark-btn {
  align-self:flex-start; padding:8px 16px; border-radius:7px;
  border:none; cursor:pointer;
  font-family:'Outfit',sans-serif; font-size:12px; font-weight:600;
  transition:all 0.18s;
}
.mark-btn.untried { background:var(--ink); color:var(--sand); }
.mark-btn.tried   { background:var(--sage-bg); color:var(--sage); border:1.5px solid var(--sage); }

/* ── BOTTOM NAV ──────────────────────────────────────────────── */
.bottom-nav {
  position:fixed; bottom:0; left:0; right:0;
  background:var(--ink);
  border-top:1px solid rgba(255,255,255,0.08);
  display:flex; padding:8px 0 env(safe-area-inset-bottom,8px);
  z-index:99;
}
.bnav {
  flex:1; display:flex; flex-direction:column; align-items:center;
  gap:3px; padding:4px; border:none; background:transparent;
  font-family:'DM Mono',monospace; font-size:9px; letter-spacing:0.5px;
  text-transform:uppercase; cursor:pointer; color:rgba(255,255,255,0.35);
  transition:color 0.2s;
}
.bnav span:first-child { font-size:18px; }
.bnav.active { color:var(--terra-lt); }

.content { padding-bottom:80px; }

/* ── EMPTY ───────────────────────────────────────────────────── */
.empty { display:none; text-align:center; padding:60px 20px; }
.empty.show { display:block; }
.empty-icon { font-size:48px; margin-bottom:12px; }
.empty p { color:var(--muted); font-size:14px; font-family:'DM Mono',monospace; }

/* ── TOAST ───────────────────────────────────────────────────── */
.toast {
  position:fixed; bottom:74px; left:50%;
  transform:translateX(-50%) translateY(8px);
  background:var(--ink); color:var(--sand);
  border:1px solid rgba(255,255,255,0.1);
  padding:9px 20px; border-radius:8px;
  font-family:'DM Mono',monospace; font-size:11px;
  letter-spacing:0.5px;
  opacity:0; pointer-events:none;
  transition:all 0.25s; z-index:200; white-space:nowrap;
}
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

/* scroll top */
.scroll-top {
  position:fixed; bottom:70px; right:14px;
  width:36px; height:36px; border-radius:8px;
  background:var(--ink); color:var(--sand);
  border:1px solid rgba(255,255,255,0.1);
  font-size:16px; cursor:pointer;
  display:none; align-items:center; justify-content:center;
  z-index:90;
}
.scroll-top.show { display:flex; }
</style>
</head>
<body>

<!-- ── DASHBOARD HEADER ──────────────────────────────────────── -->
<div class="dash-header">
  <div class="dash-top-row">
    <div class="dash-brand">
      <div class="dash-brand-eyebrow">Dindigul · Summer 2025</div>
      <div class="dash-brand-title">Summer<br><em>Sips</em> Tracker</div>
    </div>
    <div class="dash-date" id="dashDate"></div>
  </div>

  <div class="kpi-row">
    <div class="kpi-card morning">
      <div class="kpi-val" id="kpiM">0/25</div>
      <div class="kpi-lbl">🌅 Morn</div>
    </div>
    <div class="kpi-card noon">
      <div class="kpi-val" id="kpiN">0/30</div>
      <div class="kpi-lbl">☀️ Noon</div>
    </div>
    <div class="kpi-card evening">
      <div class="kpi-val" id="kpiE">0/30</div>
      <div class="kpi-lbl">🌇 Eve</div>
    </div>
    <div class="kpi-card night">
      <div class="kpi-val" id="kpiNt">0/25</div>
      <div class="kpi-lbl">🌙 Night</div>
    </div>
  </div>

  <div class="master-prog">
    <div class="mprog-label-row">
      <span class="mprog-lbl">Overall Progress</span>
      <span class="mprog-val" id="mprogVal">0%</span>
    </div>
    <div class="mprog-track">
      <div class="mprog-fill" id="mprogFill" style="width:0%"></div>
    </div>
    <div class="mprog-sub">
      <span class="mprog-count" id="mprogCount">0 of 110 tried</span>
      <span class="mprog-milestone" id="mprogMile"></span>
    </div>
  </div>

  <div class="section-bars">
    <div class="sbar morning">
      <div class="sbar-label">Morning</div>
      <div class="sbar-track"><div class="sbar-fill" id="sbarM" style="width:0%"></div></div>
      <div class="sbar-count" id="sbarMlbl">0%</div>
    </div>
    <div class="sbar noon">
      <div class="sbar-label">Noon</div>
      <div class="sbar-track"><div class="sbar-fill" id="sbarN" style="width:0%"></div></div>
      <div class="sbar-count" id="sbarNlbl">0%</div>
    </div>
    <div class="sbar evening">
      <div class="sbar-label">Evening</div>
      <div class="sbar-track"><div class="sbar-fill" id="sbarE" style="width:0%"></div></div>
      <div class="sbar-count" id="sbarElbl">0%</div>
    </div>
    <div class="sbar night">
      <div class="sbar-label">Night</div>
      <div class="sbar-track"><div class="sbar-fill" id="sbarNt" style="width:0%"></div></div>
      <div class="sbar-count" id="sbarNtlbl">0%</div>
    </div>
  </div>
</div>

<!-- ── CONTROLS ──────────────────────────────────────────────── -->
<div class="controls-bar">
  <div class="search-row">
    <span class="search-icon">⌕</span>
    <input type="search" id="searchInput" placeholder="Search drinks, ingredients, benefits…">
  </div>
  <div class="filter-chips" id="filterRow">
    <button class="fchip on-all" data-f="all">All</button>
    <button class="fchip" data-f="morning">🌅 Morning</button>
    <button class="fchip" data-f="noon">☀️ Noon</button>
    <button class="fchip" data-f="evening">🌇 Evening</button>
    <button class="fchip" data-f="night">🌙 Night</button>
    <button class="fchip" data-f="fav">❤ Favs</button>
    <button class="fchip" data-f="tried">✓ Tried</button>
    <button class="fchip" data-f="untried">○ Untried</button>
  </div>
</div>

<!-- ── CONTENT ────────────────────────────────────────────────── -->
<div class="content" id="mainContent"></div>
<div class="empty" id="emptyState">
  <div class="empty-icon">🌵</div>
  <p>No results found</p>
</div>

<div class="toast" id="toast"></div>
<button class="scroll-top" id="scrollTop" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

// ── STATE ─────────────────────────────────────────────────────────────────────
const SK='ddash_v1';
let S={tried:{},favs:{}};
try{S=JSON.parse(localStorage.getItem(SK))||{tried:{},favs:{}};}catch(e){}
function save(){try{localStorage.setItem(SK,JSON.stringify(S));}catch(e){}}

// ── CONFIG ────────────────────────────────────────────────────────────────────
let curF='all', curQ='';
const SECS=[
  {id:'morning',emoji:'🌅',label:'Morning Drinks',time:'6 AM – 11 AM'},
  {id:'noon',   emoji:'☀️', label:'Noon & Afternoon',time:'11 AM – 4 PM'},
  {id:'evening',emoji:'🌇',label:'Evening Drinks', time:'4 PM – 8 PM'},
  {id:'night',  emoji:'🌙',label:'Night & Bedtime',time:'8 PM – 10 PM'},
];
const SECMAP={morning:'M',noon:'N',evening:'E',night:'Nt'};

// ── DATE ──────────────────────────────────────────────────────────────────────
const now=new Date();
document.getElementById('dashDate').innerHTML=
  now.toLocaleDateString('en-IN',{weekday:'short',day:'numeric',month:'short'})+
  '<br>Dindigul, TN';

// ── BUILD ─────────────────────────────────────────────────────────────────────
function build(){
  const cont=document.getElementById('mainContent');
  cont.innerHTML='';
  SECS.forEach(sec=>{
    const secDrinks=DRINKS.filter(d=>d[0]===sec.id);
    const wrap=document.createElement('div');
    wrap.dataset.section=sec.id;

    // section header
    const hdr=document.createElement('div');
    hdr.className=`sec-hdr ${sec.id}`;
    hdr.innerHTML=`
      <div class="sec-hdr-dot"></div>
      <div class="sec-hdr-title">${sec.emoji} ${sec.label}</div>
      <div class="sec-hdr-meta">
        <span id="secmeta-${sec.id}">0/${secDrinks.length}</span>
        <div class="sec-prog-wrap">
          <div class="sec-prog-track"><div class="sec-prog-fill" id="secprog-${sec.id}" style="width:0%"></div></div>
        </div>
      </div>`;
    wrap.appendChild(hdr);

    const rows=document.createElement('div');
    rows.className='drink-rows';
    rows.id=`rows-${sec.id}`;
    secDrinks.forEach((d,i)=>{rows.appendChild(makeRow(d,i));});
    wrap.appendChild(rows);
    cont.appendChild(wrap);
  });
  updateStats();
}

function makeRow(d,idx){
  const [time,id,name,isCustom,ingredients,steps,benefits,bestFor]=d;
  const frag=document.createDocumentFragment();

  const row=document.createElement('div');
  row.className=`drow ${time}${S.tried[id]?' tried-row':''}${S.favs[id]?' fav-row':''}`;
  row.dataset.id=id; row.dataset.time=time;
  row.dataset.srch=`${name} ${ingredients.join(' ')} ${benefits.join(' ')} ${bestFor}`.toLowerCase();
  row.style.animationDelay=(idx*0.02)+'s';

  row.innerHTML=`
    <div class="row-idx">${id}</div>
    <div class="row-dot"></div>
    <div class="row-info" onclick="toggleExpand('${id}')">
      <div class="row-name">${name}${isCustom?'<span class="row-name-custom">✦ CUSTOM</span>':''}</div>
      <div class="row-sub">${ingredients.slice(0,3).join(' · ')}</div>
    </div>
    <div class="row-tags">
      <div class="time-pill">${bestFor.split('/')[0].trim()}</div>
    </div>
    <div class="row-actions">
      <button class="row-expand-btn" onclick="toggleExpand('${id}')" title="Recipe">📋</button>
      <button class="row-fav" onclick="toggleFav('${id}',this)">${S.favs[id]?'❤️':'🤍'}</button>
      <button class="row-check${S.tried[id]?' on':''}" onclick="toggleTried('${id}',this)">✓</button>
    </div>`;

  // expand panel
  const panel=document.createElement('div');
  panel.className='row-expand-panel';
  panel.id=`panel-${id}`;
  panel.innerHTML=`
    <div class="panel-inner ${time}">
      <div>
        <div class="panel-section-label">Ingredients</div>
        <div class="ing-list">${ingredients.map(i=>`<span class="ing-tag">${i}</span>`).join('')}</div>
      </div>
      <div>
        <div class="panel-section-label">Step-by-Step Recipe</div>
        <div class="recipe-steps">
          ${steps.map((s,i)=>`<div class="rstep"><div class="rstep-num">${i+1}</div><div class="rstep-txt">${s}</div></div>`).join('')}
        </div>
      </div>
      <div>
        <div class="panel-section-label">Health Benefits</div>
        <div class="ben-list">${benefits.map(b=>`<span class="ben-tag">${b}</span>`).join('')}</div>
      </div>
      <button class="mark-btn ${S.tried[id]?'tried':'untried'}" id="mb-${id}" onclick="toggleTried('${id}',null,this)">
        ${S.tried[id]?'✓ Tried — tap to unmark':'Mark as Tried'}
      </button>
    </div>`;

  frag.appendChild(row);
  frag.appendChild(panel);
  return frag;
}

function toggleExpand(id){
  const panel=document.getElementById(`panel-${id}`);
  const isOpen=panel.classList.contains('open');
  document.querySelectorAll('.row-expand-panel.open').forEach(p=>{if(p!==panel)p.classList.remove('open');});
  panel.classList.toggle('open',!isOpen);
}

// ── INTERACTIONS ──────────────────────────────────────────────────────────────
function toggleTried(id,rowBtn,markBtn){
  S.tried[id]=!S.tried[id]; save();
  const row=document.querySelector(`.drow[data-id="${id}"]`);
  if(row){
    row.classList.toggle('tried-row',!!S.tried[id]);
    const rb=rowBtn||row.querySelector('.row-check');
    if(rb)rb.classList.toggle('on',!!S.tried[id]);
  }
  const mb=markBtn||document.getElementById(`mb-${id}`);
  if(mb){mb.className=`mark-btn ${S.tried[id]?'tried':'untried'}`;mb.textContent=S.tried[id]?'✓ Tried — tap to unmark':'Mark as Tried';}
  updateStats(); applyFilter();
  showToast(S.tried[id]?'✓ Marked as tried':'○ Unmarked');
}

function toggleFav(id,btn){
  S.favs[id]=!S.favs[id]; save();
  const row=document.querySelector(`.drow[data-id="${id}"]`);
  if(row)row.classList.toggle('fav-row',!!S.favs[id]);
  if(btn)btn.textContent=S.favs[id]?'❤️':'🤍';
  updateStats(); applyFilter();
  showToast(S.favs[id]?'❤ Added to favs':'Removed from favs');
}

// ── STATS ─────────────────────────────────────────────────────────────────────
function updateStats(){
  const tot=DRINKS.length;
  const tried=Object.values(S.tried).filter(Boolean).length;
  const pct=Math.round(tried/tot*100);
  document.getElementById('mprogFill').style.width=pct+'%';
  document.getElementById('mprogVal').textContent=pct+'%';
  document.getElementById('mprogCount').textContent=`${tried} of ${tot} tried`;
  const ms=[[10,'🌱 Keep going!'],[25,'🌿 Quarter done!'],[50,'🌳 Halfway!'],[75,'🏆 Almost there!'],[tot,'🎉 All 110! Legend!']];
  let msg=''; for(const[n,m]of ms)if(tried>=n)msg=m;
  document.getElementById('mprogMile').textContent=msg;

  SECS.forEach(sec=>{
    const sd=DRINKS.filter(d=>d[0]===sec.id);
    const st=sd.filter(d=>S.tried[d[1]]).length;
    const pct2=Math.round(st/sd.length*100);
    const k=SECMAP[sec.id];
    const kpiEl=document.getElementById('kpi'+k);
    if(kpiEl)kpiEl.textContent=`${st}/${sd.length}`;
    const sbarEl=document.getElementById('sbar'+k);
    if(sbarEl)sbarEl.style.width=pct2+'%';
    const sbarlbl=document.getElementById('sbar'+k+'lbl');
    if(sbarlbl)sbarlbl.textContent=pct2+'%';
    const secmeta=document.getElementById('secmeta-'+sec.id);
    if(secmeta)secmeta.textContent=`${st}/${sd.length}`;
    const secprog=document.getElementById('secprog-'+sec.id);
    if(secprog)secprog.style.width=pct2+'%';
  });
}

// ── FILTER ────────────────────────────────────────────────────────────────────
function applyFilter(){
  let vis=0;
  document.querySelectorAll('.drow').forEach(row=>{
    const id=row.dataset.id; const time=row.dataset.time;
    const srch=row.dataset.srch||'';
    const mQ=!curQ||srch.includes(curQ);
    let mF=true;
    if(curF==='fav')mF=!!S.favs[id];
    else if(curF==='tried')mF=!!S.tried[id];
    else if(curF==='untried')mF=!S.tried[id];
    else if(['morning','noon','evening','night'].includes(curF))mF=time===curF;
    const show=mQ&&mF;
    row.classList.toggle('hidden',!show);
    const panel=document.getElementById(`panel-${id}`);
    if(panel&&!show)panel.classList.remove('open');
    if(show)vis++;
  });
  SECS.forEach(sec=>{
    const wrap=document.querySelector(`[data-section="${sec.id}"]`);
    if(!wrap)return;
    const v=wrap.querySelectorAll('.drow:not(.hidden)').length;
    wrap.style.display=v>0?'block':'none';
  });
  document.getElementById('emptyState').classList.toggle('show',vis===0);
}

function doFilter(f,btn){
  curF=f;
  document.querySelectorAll('.fchip').forEach(c=>{c.className='fchip'+(c.dataset.f===f?` on-${f}`:'');});
  if(btn){document.querySelectorAll('.bnav').forEach(b=>b.classList.remove('active'));btn.classList.add('active');}
  applyFilter();
  window.scrollTo({top:0,behavior:'smooth'});
}

// ── TOAST ─────────────────────────────────────────────────────────────────────
let tt;
function showToast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(tt); tt=setTimeout(()=>el.classList.remove('show'),2000);
}

// ── INIT ──────────────────────────────────────────────────────────────────────
build(); applyFilter();

document.getElementById('searchInput').addEventListener('input',e=>{
  curQ=e.target.value.toLowerCase().trim(); applyFilter();
});
document.querySelectorAll('.fchip').forEach(c=>{
  c.addEventListener('click',()=>doFilter(c.dataset.f));
});
window.addEventListener('scroll',()=>{
  document.getElementById('scrollTop').classList.toggle('show',scrollY>500);
});
</script>
