<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>🥭 Dindigul Summer Drinks</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --morning: #f59e0b;
    --morning-soft: #fef3c7;
    --morning-deep: #92400e;
    --noon: #0ea5e9;
    --noon-soft: #e0f2fe;
    --noon-deep: #0c4a6e;
    --evening: #8b5cf6;
    --evening-soft: #ede9fe;
    --evening-deep: #4c1d95;
    --night: #1e3a5f;
    --night-soft: #e2e8f0;
    --night-deep: #0f172a;
    --bg: #0a0f1e;
    --surface: #111827;
    --surface2: #1f2937;
    --text: #f1f5f9;
    --text-muted: #94a3b8;
    --gold: #fbbf24;
    --green: #10b981;
    --radius: 16px;
    --shadow: 0 8px 32px rgba(0,0,0,0.4);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── HERO ────────────────────────────────────────────────────── */
  .hero {
    background: linear-gradient(135deg, #0f3460 0%, #1a1a4e 40%, #0a0f1e 100%);
    padding: 28px 20px 24px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 30% 50%, rgba(245,158,11,0.12) 0%, transparent 60%),
                radial-gradient(ellipse at 70% 20%, rgba(14,165,233,0.10) 0%, transparent 50%);
  }
  .hero-emoji { font-size: 48px; display: block; margin-bottom: 8px; position: relative; animation: floaty 3s ease-in-out infinite; }
  @keyframes floaty { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
  .hero h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(22px, 6vw, 34px);
    font-weight: 900;
    background: linear-gradient(135deg, #fbbf24, #f97316, #fbbf24);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    position: relative;
  }
  .hero p { color: #93c5fd; font-size: 13px; margin-top: 6px; position: relative; }

  /* ── STATS BAR ─────────────────────────────────────────────── */
  .stats-bar {
    display: grid; grid-template-columns: repeat(4, 1fr);
    gap: 10px; padding: 16px 14px; background: var(--surface);
    border-bottom: 1px solid #1e2d3d;
  }
  .stat-card {
    background: var(--surface2); border-radius: 12px;
    padding: 10px 8px; text-align: center;
    border: 1px solid #2d3748;
  }
  .stat-num { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700; }
  .stat-label { font-size: 10px; color: var(--text-muted); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.5px; }
  .stat-card.morning .stat-num { color: var(--morning); }
  .stat-card.noon .stat-num { color: var(--noon); }
  .stat-card.evening .stat-num { color: var(--evening); }
  .stat-card.night .stat-num { color: #64748b; }

  /* ── PROGRESS ─────────────────────────────────────────────── */
  .progress-wrap { padding: 14px 14px 0; }
  .progress-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .progress-label { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .progress-count { font-family: 'Playfair Display', serif; font-size: 15px; color: var(--gold); }
  .progress-bar { height: 8px; background: var(--surface2); border-radius: 99px; overflow: hidden; }
  .progress-fill {
    height: 100%; border-radius: 99px;
    background: linear-gradient(90deg, #f59e0b, #10b981);
    transition: width 0.5s cubic-bezier(.4,0,.2,1);
  }
  .milestone { font-size: 11px; color: var(--green); margin-top: 6px; min-height: 16px; text-align: center; }

  /* ── CONTROLS ─────────────────────────────────────────────── */
  .controls { padding: 14px; display: flex; flex-direction: column; gap: 10px; }
  .search-wrap { position: relative; }
  .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: 15px; }
  .search-input {
    width: 100%; padding: 11px 12px 11px 36px;
    background: var(--surface2); border: 1px solid #2d3748;
    border-radius: 12px; color: var(--text); font-family: 'DM Sans', sans-serif;
    font-size: 14px; outline: none;
    transition: border-color 0.2s;
  }
  .search-input:focus { border-color: var(--gold); }
  .search-input::placeholder { color: var(--text-muted); }

  .filter-row { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 2px; scrollbar-width: none; }
  .filter-row::-webkit-scrollbar { display: none; }
  .filter-btn {
    flex-shrink: 0; padding: 7px 14px; border-radius: 99px;
    border: 1.5px solid #2d3748; background: transparent;
    color: var(--text-muted); font-family: 'DM Sans', sans-serif;
    font-size: 12px; font-weight: 500; cursor: pointer;
    transition: all 0.2s; white-space: nowrap;
  }
  .filter-btn.active { color: #0a0f1e; font-weight: 600; border-color: transparent; }
  .filter-btn[data-filter="all"].active { background: var(--gold); }
  .filter-btn[data-filter="morning"].active { background: var(--morning); }
  .filter-btn[data-filter="noon"].active { background: var(--noon); }
  .filter-btn[data-filter="evening"].active { background: var(--evening); }
  .filter-btn[data-filter="night"].active { background: #475569; color: #fff; }
  .filter-btn[data-filter="fav"].active { background: #ef4444; color: #fff; }
  .filter-btn[data-filter="tried"].active { background: var(--green); }
  .filter-btn[data-filter="untried"].active { background: #6366f1; color: #fff; }

  /* ── SECTION HEADER ─────────────────────────────────────── */
  .section-header {
    display: flex; align-items: center; gap: 10px;
    padding: 16px 14px 8px;
    position: sticky; top: 0; z-index: 10;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }
  .section-header.morning { background: rgba(10,15,30,0.92); border-left: 3px solid var(--morning); }
  .section-header.noon    { background: rgba(10,15,30,0.92); border-left: 3px solid var(--noon); }
  .section-header.evening { background: rgba(10,15,30,0.92); border-left: 3px solid var(--evening); }
  .section-header.night   { background: rgba(10,15,30,0.92); border-left: 3px solid #475569; }
  .section-emoji { font-size: 22px; }
  .section-title { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 700; }
  .section-count { margin-left: auto; font-size: 11px; color: var(--text-muted); background: var(--surface2); padding: 3px 10px; border-radius: 99px; }
  .section-header.morning .section-title { color: var(--morning); }
  .section-header.noon    .section-title { color: var(--noon); }
  .section-header.evening .section-title { color: var(--evening); }
  .section-header.night   .section-title { color: #94a3b8; }

  /* ── DRINK CARD ─────────────────────────────────────────── */
  .drinks-list { padding: 0 14px; display: flex; flex-direction: column; gap: 10px; margin-bottom: 10px; }

  .drink-card {
    background: var(--surface); border-radius: var(--radius);
    border: 1px solid #1e2d3d;
    overflow: hidden;
    transition: transform 0.15s, box-shadow 0.15s;
    animation: cardIn 0.3s ease both;
  }
  @keyframes cardIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
  .drink-card:active { transform: scale(0.99); }
  .drink-card.tried { border-color: rgba(16,185,129,0.3); background: rgba(16,185,129,0.04); }
  .drink-card.fav-card { border-color: rgba(239,68,68,0.3); }
  .drink-card.hidden { display: none; }

  .card-main {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 14px; cursor: pointer;
  }

  /* Number badge */
  .drink-num {
    flex-shrink: 0; width: 32px; height: 32px;
    border-radius: 10px; display: flex; align-items: center;
    justify-content: center; font-size: 11px; font-weight: 700;
    margin-top: 1px;
  }
  .morning .drink-num  { background: rgba(245,158,11,0.15); color: var(--morning); }
  .noon    .drink-num  { background: rgba(14,165,233,0.15); color: var(--noon); }
  .evening .drink-num  { background: rgba(139,92,246,0.15); color: var(--evening); }
  .night   .drink-num  { background: rgba(71,85,105,0.2);   color: #94a3b8; }
  .card-custom .drink-num { background: rgba(16,185,129,0.15); color: var(--green); }

  .card-info { flex: 1; min-width: 0; }
  .card-name { font-weight: 600; font-size: 15px; line-height: 1.3; }
  .card-custom-tag { display: inline-block; font-size: 9px; font-weight: 700; letter-spacing: 0.5px; padding: 1px 6px; border-radius: 99px; background: rgba(16,185,129,0.2); color: var(--green); margin-left: 6px; vertical-align: middle; }
  .card-best { font-size: 11px; color: var(--text-muted); margin-top: 3px; }

  .card-actions { flex-shrink: 0; display: flex; flex-direction: column; align-items: center; gap: 8px; }

  /* Checkbox */
  .check-btn {
    width: 28px; height: 28px; border-radius: 8px;
    border: 2px solid #2d3748; background: transparent;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    font-size: 14px; transition: all 0.2s; color: transparent;
  }
  .check-btn.checked { background: var(--green); border-color: var(--green); color: #fff; }
  .morning  .check-btn.checked { background: var(--morning); border-color: var(--morning); }
  .noon     .check-btn.checked { background: var(--noon);    border-color: var(--noon); }
  .evening  .check-btn.checked { background: var(--evening); border-color: var(--evening); }

  /* Fav */
  .fav-btn {
    width: 28px; height: 28px; border-radius: 8px;
    border: none; background: transparent;
    cursor: pointer; font-size: 16px; display: flex;
    align-items: center; justify-content: center;
    transition: transform 0.2s;
  }
  .fav-btn:active { transform: scale(1.3); }

  /* ── EXPAND PANEL ───────────────────────────────────────── */
  .card-expand {
    max-height: 0; overflow: hidden;
    transition: max-height 0.4s cubic-bezier(.4,0,.2,1);
    border-top: 0px solid #1e2d3d;
  }
  .card-expand.open {
    max-height: 600px;
    border-top: 1px solid #1e2d3d;
  }
  .expand-inner { padding: 14px; display: flex; flex-direction: column; gap: 12px; }

  .expand-section { display: flex; flex-direction: column; gap: 5px; }
  .expand-label {
    font-size: 10px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.8px; color: var(--text-muted);
  }
  .expand-text { font-size: 13px; line-height: 1.6; color: #cbd5e1; }

  .recipe-steps { display: flex; flex-direction: column; gap: 6px; }
  .recipe-step { display: flex; gap: 10px; align-items: flex-start; }
  .step-num {
    flex-shrink: 0; width: 20px; height: 20px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 700; margin-top: 1px;
  }
  .morning  .step-num { background: rgba(245,158,11,0.2); color: var(--morning); }
  .noon     .step-num { background: rgba(14,165,233,0.2); color: var(--noon); }
  .evening  .step-num { background: rgba(139,92,246,0.2); color: var(--evening); }
  .night    .step-num { background: rgba(71,85,105,0.3);  color: #94a3b8; }
  .step-text { font-size: 13px; line-height: 1.55; color: #cbd5e1; }

  .benefits-pills { display: flex; flex-wrap: wrap; gap: 6px; }
  .benefit-pill {
    font-size: 11px; padding: 3px 10px; border-radius: 99px;
    font-weight: 500;
  }
  .morning  .benefit-pill { background: rgba(245,158,11,0.12); color: #fcd34d; }
  .noon     .benefit-pill { background: rgba(14,165,233,0.12);  color: #7dd3fc; }
  .evening  .benefit-pill { background: rgba(139,92,246,0.12);  color: #c4b5fd; }
  .night    .benefit-pill { background: rgba(71,85,105,0.2);    color: #94a3b8; }
  .card-custom .benefit-pill { background: rgba(16,185,129,0.12); color: #6ee7b7; }

  .mark-tried-btn {
    width: 100%; padding: 10px;
    border-radius: 10px; border: none; cursor: pointer;
    font-family: 'DM Sans', sans-serif; font-size: 13px;
    font-weight: 600; transition: all 0.2s;
  }
  .mark-tried-btn.not-tried { background: var(--surface2); color: var(--text); border: 1.5px solid #2d3748; }
  .mark-tried-btn.is-tried  { background: rgba(16,185,129,0.15); color: var(--green); border: 1.5px solid rgba(16,185,129,0.3); }

  /* ── EMPTY STATE ────────────────────────────────────────── */
  .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); display: none; }
  .empty-state.show { display: block; }
  .empty-state .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; }

  /* ── TOAST ──────────────────────────────────────────────── */
  .toast {
    position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--surface2); color: var(--text); padding: 10px 20px;
    border-radius: 99px; font-size: 13px; font-weight: 500;
    box-shadow: var(--shadow); opacity: 0; pointer-events: none;
    transition: all 0.3s; z-index: 999; white-space: nowrap;
    border: 1px solid #2d3748;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── BOTTOM NAV ─────────────────────────────────────────── */
  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: rgba(17,24,39,0.97); border-top: 1px solid #1e2d3d;
    display: flex; padding: 8px 0 env(safe-area-inset-bottom, 8px);
    backdrop-filter: blur(20px); z-index: 100;
  }
  .nav-btn {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    gap: 3px; padding: 6px 4px; border: none; background: transparent;
    cursor: pointer; color: var(--text-muted); font-family: 'DM Sans', sans-serif;
    font-size: 10px; font-weight: 500; transition: color 0.2s;
  }
  .nav-btn.active { color: var(--gold); }
  .nav-btn span:first-child { font-size: 18px; }

  .content { padding-bottom: 80px; }

  /* scroll to top */
  .scroll-top {
    position: fixed; bottom: 72px; right: 16px;
    width: 40px; height: 40px; border-radius: 12px;
    background: var(--surface2); border: 1px solid #2d3748;
    color: var(--text-muted); cursor: pointer; font-size: 18px;
    display: none; align-items: center; justify-content: center;
    box-shadow: var(--shadow); z-index: 99;
  }
  .scroll-top.show { display: flex; }

  .no-results { display: none; text-align: center; padding: 40px 20px; color: var(--text-muted); font-size: 14px; }
  .no-results.show { display: block; }
</style>
</head>
<body>

<!-- HERO -->
<div class="hero">
  <span class="hero-emoji">🥭</span>
  <h1>Dindigul Summer Drinks</h1>
  <p>110 refreshing drinks · Track · Discover · Enjoy</p>
</div>

<!-- PROGRESS -->
<div class="progress-wrap" style="padding:14px;">
  <div class="progress-header">
    <span class="progress-label">🏆 Your Journey</span>
    <span class="progress-count" id="progressCount">0 / 110 tried</span>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  <div class="milestone" id="milestone"></div>
</div>

<!-- STATS -->
<div class="stats-bar">
  <div class="stat-card morning">
    <div class="stat-num" id="statM">0</div>
    <div class="stat-label">🌅 Morning</div>
  </div>
  <div class="stat-card noon">
    <div class="stat-num" id="statN">0</div>
    <div class="stat-label">☀️ Noon</div>
  </div>
  <div class="stat-card evening">
    <div class="stat-num" id="statE">0</div>
    <div class="stat-label">🌇 Evening</div>
  </div>
  <div class="stat-card night">
    <div class="stat-num" id="statNt">0</div>
    <div class="stat-label">🌙 Night</div>
  </div>
</div>

<!-- CONTROLS -->
<div class="controls">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input class="search-input" type="search" id="searchInput" placeholder="Search drinks or ingredients…">
  </div>
  <div class="filter-row">
    <button class="filter-btn active" data-filter="all">All Drinks</button>
    <button class="filter-btn" data-filter="morning">🌅 Morning</button>
    <button class="filter-btn" data-filter="noon">☀️ Noon</button>
    <button class="filter-btn" data-filter="evening">🌇 Evening</button>
    <button class="filter-btn" data-filter="night">🌙 Night</button>
    <button class="filter-btn" data-filter="fav">❤️ Favs</button>
    <button class="filter-btn" data-filter="tried">✅ Tried</button>
    <button class="filter-btn" data-filter="untried">⭕ Untried</button>
  </div>
</div>

<!-- CONTENT -->
<div class="content" id="mainContent"></div>
<div class="no-results" id="noResults">😕 No drinks match your search.<br>Try a different keyword!</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- SCROLL TOP -->
<button class="scroll-top" id="scrollTop" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <button class="nav-btn active" onclick="filterDrinks('all'); setNav(this)"><span>🥤</span><span>All</span></button>
  <button class="nav-btn" onclick="filterDrinks('fav'); setNav(this)"><span>❤️</span><span>Favs</span></button>
  <button class="nav-btn" onclick="filterDrinks('tried'); setNav(this)"><span>✅</span><span>Tried</span></button>
  <button class="nav-btn" onclick="filterDrinks('untried'); setNav(this)"><span>⭕</span><span>Untried</span></button>
</div>

// ─── STATE ─────────────────────────────────────────────────────────────────
const STORAGE_KEY = 'dindigul_drinks_v3';
let state = { tried: {}, favs: {} };

function loadState() {
  try { state = JSON.parse(localStorage.getItem(STORAGE_KEY)) || { tried:{}, favs:{} }; }
  catch(e) { state = { tried:{}, favs:{} }; }
}
function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e){}
}

// ─── BUILD UI ───────────────────────────────────────────────────────────────
let currentFilter = 'all';
let searchTerm = '';

const SECTIONS = [
  { id:'morning', emoji:'🌅', label:'Morning', time:'6 AM – 11 AM' },
  { id:'noon',    emoji:'☀️',  label:'Noon & Afternoon', time:'11 AM – 4 PM' },
  { id:'evening', emoji:'🌇', label:'Evening', time:'4 PM – 8 PM' },
  { id:'night',   emoji:'🌙', label:'Night & Bedtime', time:'8 PM – 10 PM' },
];

function buildAll() {
  const container = document.getElementById('mainContent');
  container.innerHTML = '';
  SECTIONS.forEach(sec => {
    const secEl = document.createElement('div');
    secEl.dataset.section = sec.id;

    // Section header
    const hdr = document.createElement('div');
    hdr.className = `section-header ${sec.id}`;
    hdr.innerHTML = `<span class="section-emoji">${sec.emoji}</span>
      <div>
        <div class="section-title">${sec.label}</div>
        <div style="font-size:11px;color:#64748b;margin-top:1px">${sec.time}</div>
      </div>
      <div class="section-count" id="count-${sec.id}"></div>`;
    secEl.appendChild(hdr);

    // Cards list
    const list = document.createElement('div');
    list.className = 'drinks-list';
    list.id = `list-${sec.id}`;

    DRINKS.filter(d => d[0] === sec.id).forEach((d, idx) => {
      const [time, id, name, isCustom, ingredients, steps, benefits, bestFor] = d;
      const card = buildCard(id, name, isCustom, ingredients, steps, benefits, bestFor, time);
      list.appendChild(card);
    });

    secEl.appendChild(list);
    container.appendChild(secEl);
  });

  updateStats();
}

function buildCard(id, name, isCustom, ingredients, steps, benefits, bestFor, time) {
  const card = document.createElement('div');
  card.className = `drink-card ${time}${isCustom ? ' card-custom' : ''}`;
  card.dataset.id = id;
  card.dataset.name = name.toLowerCase();
  card.dataset.ing = ingredients.toLowerCase();
  card.dataset.time = time;

  if (state.tried[id]) card.classList.add('tried');
  if (state.favs[id]) card.classList.add('fav-card');

  const checked = state.tried[id] ? 'checked' : '';
  const fav = state.favs[id] ? '❤️' : '🤍';
  const customBadge = isCustom ? `<span class="card-custom-tag">✦ CUSTOM</span>` : '';

  card.innerHTML = `
    <div class="card-main" onclick="toggleExpand('${id}')">
      <div class="drink-num">${id}</div>
      <div class="card-info">
        <div class="card-name">${name}${customBadge}</div>
        <div class="card-best">🕐 ${bestFor}</div>
      </div>
      <div class="card-actions" onclick="event.stopPropagation()">
        <button class="check-btn ${checked}" onclick="toggleTried('${id}', this)" title="Mark as tried">✓</button>
        <button class="fav-btn" onclick="toggleFav('${id}', this)" title="Favourite">${fav}</button>
      </div>
    </div>
    <div class="card-expand" id="expand-${id}">
      <div class="expand-inner">
        <div class="expand-section">
          <div class="expand-label">🌿 Key Ingredients</div>
          <div class="expand-text">${ingredients}</div>
        </div>
        <div class="expand-section">
          <div class="expand-label">📋 Step-by-Step Recipe</div>
          <div class="recipe-steps">
            ${steps.map((s,i) => `<div class="recipe-step"><div class="step-num">${i+1}</div><div class="step-text">${s}</div></div>`).join('')}
          </div>
        </div>
        <div class="expand-section">
          <div class="expand-label">💚 Health Benefits</div>
          <div class="benefits-pills">
            ${benefits.map(b => `<span class="benefit-pill">${b}</span>`).join('')}
          </div>
        </div>
        <button class="mark-tried-btn ${state.tried[id] ? 'is-tried' : 'not-tried'}" id="markBtn-${id}" onclick="toggleTried('${id}', null, this)">
          ${state.tried[id] ? '✅ Tried! Mark as Untried' : '☑️ Mark as Tried'}
        </button>
      </div>
    </div>`;

  return card;
}

function toggleExpand(id) {
  const exp = document.getElementById(`expand-${id}`);
  const isOpen = exp.classList.contains('open');
  // Close all others
  document.querySelectorAll('.card-expand.open').forEach(e => e.classList.remove('open'));
  if (!isOpen) exp.classList.add('open');
}

function toggleTried(id, checkBtn, markBtn) {
  state.tried[id] = !state.tried[id];
  saveState();

  const card = document.querySelector(`.drink-card[data-id="${id}"]`);
  if (card) { card.classList.toggle('tried', state.tried[id]); }

  // Update check button
  const cb = checkBtn || card?.querySelector('.check-btn');
  if (cb) cb.classList.toggle('checked', state.tried[id]);

  // Update mark button
  const mb = markBtn || document.getElementById(`markBtn-${id}`);
  if (mb) {
    mb.className = `mark-tried-btn ${state.tried[id] ? 'is-tried' : 'not-tried'}`;
    mb.textContent = state.tried[id] ? '✅ Tried! Mark as Untried' : '☑️ Mark as Tried';
  }

  updateStats();
  applyFilters();
  showToast(state.tried[id] ? `✅ ${getDrinkName(id)} marked as tried!` : `⭕ Unmarked`);
}

function toggleFav(id, btn) {
  state.favs[id] = !state.favs[id];
  saveState();
  const card = document.querySelector(`.drink-card[data-id="${id}"]`);
  if (card) card.classList.toggle('fav-card', state.favs[id]);
  if (btn) btn.textContent = state.favs[id] ? '❤️' : '🤍';
  updateStats();
  applyFilters();
  showToast(state.favs[id] ? `❤️ Added to favourites!` : `💔 Removed from favourites`);
}

function getDrinkName(id) {
  const d = DRINKS.find(x => x[1] === id);
  return d ? d[2] : id;
}

function updateStats() {
  const total = DRINKS.length;
  const triedCount = Object.values(state.tried).filter(Boolean).length;
  const pct = Math.round(triedCount / total * 100);

  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressCount').textContent = `${triedCount} / ${total} tried (${pct}%)`;

  const milestones = [
    [10,'🌱 Great start — keep going!'],
    [25,'🌿 25% done — you\'re on a roll!'],
    [50,'🌳 Halfway through the summer journey!'],
    [75,'🏆 75% complete — almost there!'],
    [100,'🎉 ALL 110 DRINKS TRIED! Legend!'],
  ];
  let msg = '';
  for (const [n, m] of milestones) {
    if (triedCount >= n) msg = m;
  }
  document.getElementById('milestone').textContent = msg;

  // Per-section stats
  ['morning','noon','evening','night'].forEach(sec => {
    const secDrinks = DRINKS.filter(d => d[0] === sec);
    const triedSec = secDrinks.filter(d => state.tried[d[1]]).length;
    const el = document.getElementById('stat' + {morning:'M',noon:'N',evening:'E',night:'Nt'}[sec]);
    if (el) el.textContent = `${triedSec}/${secDrinks.length}`;
  });

  // Update section counts
  SECTIONS.forEach(sec => {
    const el = document.getElementById(`count-${sec.id}`);
    if (el) {
      const secDrinks = DRINKS.filter(d => d[0] === sec.id);
      const tried = secDrinks.filter(d => state.tried[d[1]]).length;
      el.textContent = `${tried}/${secDrinks.length} tried`;
    }
  });
}

function applyFilters() {
  let visibleCount = 0;
  document.querySelectorAll('.drink-card').forEach(card => {
    const id = card.dataset.id;
    const name = card.dataset.name;
    const ing = card.dataset.ing;
    const time = card.dataset.time;

    const matchesSearch = !searchTerm || name.includes(searchTerm) || ing.includes(searchTerm);
    let matchesFilter = true;
    if (currentFilter === 'fav') matchesFilter = !!state.favs[id];
    else if (currentFilter === 'tried') matchesFilter = !!state.tried[id];
    else if (currentFilter === 'untried') matchesFilter = !state.tried[id];
    else if (['morning','noon','evening','night'].includes(currentFilter)) matchesFilter = time === currentFilter;

    const show = matchesSearch && matchesFilter;
    card.classList.toggle('hidden', !show);
    if (show) visibleCount++;
  });

  // Show/hide section headers
  SECTIONS.forEach(sec => {
    const sectionEl = document.querySelector(`[data-section="${sec.id}"]`);
    if (!sectionEl) return;
    const visibleCards = sectionEl.querySelectorAll('.drink-card:not(.hidden)').length;
    sectionEl.style.display = visibleCards > 0 ? 'block' : 'none';
  });

  document.getElementById('noResults').classList.toggle('show', visibleCount === 0);
}

function filterDrinks(filter) {
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.filter === filter);
  });
  applyFilters();
  window.scrollTo({top:0,behavior:'smooth'});
}

function setNav(btn) {
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2000);
}

// ─── INIT ───────────────────────────────────────────────────────────────────
loadState();
buildAll();
updateStats();
applyFilters();

// Search
document.getElementById('searchInput').addEventListener('input', e => {
  searchTerm = e.target.value.toLowerCase().trim();
  applyFilters();
});

// Filter buttons
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    filterDrinks(btn.dataset.filter);
    // sync nav
    const navMap = { fav:1, tried:2, untried:3 };
    const navBtns = document.querySelectorAll('.nav-btn');
    navBtns.forEach(b => b.classList.remove('active'));
    if (btn.dataset.filter === 'all') navBtns[0].classList.add('active');
  });
});

// Scroll top
window.addEventListener('scroll', () => {
  document.getElementById('scrollTop').classList.toggle('show', window.scrollY > 400);
});
</script>
